<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToString in JS</title>
</head>
<body>
    <h1>ToString using to output number as a string </h1>
    <h3>To string methods used to store value and converting number as a string </h3>
    <p id="demo"></p>
    <script>
        let x=123;
        let text = x.toString(2);

        document.getElementById("demo").innerHTML=text;
    </script>    
</body>
</html>
